<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow Popup</title>
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #07090e;
      --panel-bg: rgba(13, 17, 28, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent-indigo: #6366f1;
      --accent-purple: #a855f7;
      --productive: #10b981;
      --unproductive: #ef4444;
      --glow: rgba(99, 102, 241, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      width: 320px;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      padding: 1rem;
      border: 1px solid var(--border);
    }

    /* Ambient Glow Accents */
    .ambient-glow {
      position: absolute;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, var(--accent-indigo) 0%, transparent 70%);
      opacity: 0.15;
      filter: blur(20px);
      z-index: -1;
      top: -20px;
      right: -20px;
    }

    /* Glassmorphic Container */
    .glass-container {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      position: relative;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.8rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.2rem;
      background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background-color: var(--productive);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--productive);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 12px var(--productive); }
      100% { transform: scale(0.9); opacity: 0.6; }
    }

    /* Stats Hub */
    .stats-hub {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .score-circle {
      position: relative;
      width: 70px;
      height: 70px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .score-circle svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .score-circle circle {
      fill: none;
      stroke-width: 6;
    }

    .circle-bg {
      stroke: var(--border);
    }

    .circle-fill {
      stroke: url(#scoreGradient);
      stroke-linecap: round;
      stroke-dasharray: 201; /* 2 * PI * r (r=32) */
      stroke-dashoffset: 201;
      transition: stroke-dashoffset 0.8s ease;
    }

    .score-text {
      position: absolute;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .domain-info {
      flex-grow: 1;
    }

    .domain-info h4 {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .active-domain {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
      color: var(--text);
    }

    .productivity-label {
      font-size: 0.75rem;
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 4px;
      font-weight: 500;
    }

    .lbl-productive { background: rgba(16, 185, 129, 0.15); color: var(--productive); }
    .lbl-unproductive { background: rgba(239, 68, 68, 0.15); color: var(--unproductive); }
    .lbl-neutral { background: rgba(255, 255, 255, 0.08); color: var(--text-muted); }

    /* Focus Time / Pomodoro Widget */
    .widget-pomodoro {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem;
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .pomo-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.3rem;
    }

    .timer-display {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin: 0.2rem 0 0.5rem 0;
      background: linear-gradient(135deg, #ffffff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .pomo-controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-pomo {
      border: none;
      outline: none;
      cursor: pointer;
      padding: 6px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .btn-start {
      background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
      color: #fff;
    }
    .btn-start:hover {
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .btn-pause {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-pause:hover { background: rgba(255, 255, 255, 0.15); }

    /* Footer Auth Actions */
    .footer-actions {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      border-top: 1px solid var(--border);
      padding-top: 0.8rem;
    }

    .sync-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn-dashboard {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-dashboard:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent-indigo);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .dot-connected { background-color: var(--productive); box-shadow: 0 0 6px var(--productive); }
    .dot-disconnected { background-color: var(--unproductive); box-shadow: 0 0 6px var(--unproductive); }
  </style>
</head>
<body>
  <div class="ambient-glow"></div>
  
  <div class="glass-container">
    <header>
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-indigo);">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span>FocusFlow</span>
      </div>
      <div class="pulse-dot" title="Tracking active tab"></div>
    </header>

    <!-- Stats & Domain Panel -->
    <div class="stats-hub">
      <div class="score-circle">
        <svg viewBox="0 0 72 72">
          <defs>
            <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="var(--accent-indigo)" />
              <stop offset="100%" stop-color="var(--accent-purple)" />
            </linearGradient>
          </defs>
          <circle class="circle-bg" cx="36" cy="36" r="32" />
          <circle class="circle-fill" id="scoreBar" cx="36" cy="36" r="32" />
        </svg>
        <span class="score-text" id="scoreVal">--%</span>
      </div>

      <div class="domain-info">
        <h4>Current Tab</h4>
        <div class="active-domain" id="activeDomain">Loading...</div>
        <span class="productivity-label lbl-neutral" id="categoryLabel">neutral</span>
      </div>
    </div>

    <!-- Pomodoro Widget -->
    <div class="widget-pomodoro">
      <div class="pomo-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        <span id="pomoLabel">Focus Session</span>
      </div>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="pomo-controls">
        <button class="btn-pomo btn-start" id="btnStartPomo">Start</button>
        <button class="btn-pomo btn-pause" id="btnResetPomo">Reset</button>
      </div>
    </div>

    <!-- Action Section -->
    <div class="footer-actions">
      <div class="sync-status">
        <span>Sync Status</span>
        <div class="status-badge" id="syncStatus">
          <span class="status-dot dot-disconnected"></span>
          <span id="syncText">Offline</span>
        </div>
      </div>
      
      <a href="http://localhost:3000" target="_blank" class="btn-dashboard">
        <span>Open SaaS Dashboard</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
        </svg>
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
